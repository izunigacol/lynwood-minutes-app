# =================================================================
# Netlify build & function configuration
# =================================================================

[build]
  publish = "public"
  functions = "netlify/functions"

# Friendly URL: /api/generate -> the function
[[redirects]]
  from = "/api/generate"
  to   = "/.netlify/functions/generate"
  status = 200

# Single-page app fallback (for direct deep-link reloads)
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

# Functions config — Node 20 + streaming response support
[functions]
  node_bundler = "esbuild"

[functions."generate"]
  # No timeout override needed: streaming responses keep the connection open
  # until the upstream Claude SSE stream ends.
